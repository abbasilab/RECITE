# REPRODUCE: Small-sample binary equiv validation across all original models
# Runs 30 samples per model with Versa LLM judge to get binary_equiv numbers
# Compare against published: Qwen-0.5B=11.1%, Qwen-3B=66.1%, Qwen-7B=81.2%,
#   Gemma-2B=37.2%, Gemma-9B=84.7%, DeepSeek-R1-7B=1.7%, GPT-4o-mini=85.8%, GPT-4o=85.3%
#
# Usage:
#   RECITE_CONFIRM_PAID_API=1 uv run python -m recite.cli.benchmark \
#     run-benchmark --config config/reproduce_small_all_models.yaml --confirm-paid-judge

rag:
  embed_base_url: ""
  embed_model: ""
  embed_local_model: BAAI/bge-small-en-v1.5
  embed_device_index: cpu
  embed_device_query: cpu
  persist_dir: data/llamaindex_cache
  top_k: 10
  sweep_no_rag: true
  sweep_rag: false

models:
  # Versa models
  - id: versa-4o
    api_type: ucsf_versa
    model: gpt-4o-2024-08-06
    context_window: 128000
  - id: versa-4o-mini
    api_type: ucsf_versa
    model: gpt-4o-mini-2024-07-18
    context_window: 128000
  # Local python_gpu models
  - id: local-qwen-0.5b
    api_type: python_gpu
    model: Qwen/Qwen2.5-0.5B-Instruct
    gpus: 1
    context_window: 32768
  - id: local-qwen-3b
    api_type: python_gpu
    model: Qwen/Qwen2.5-3B-Instruct
    gpus: 1
    context_window: 32768
  - id: local-qwen-7b
    api_type: python_gpu
    model: Qwen/Qwen2.5-7B-Instruct
    gpus: 1
    context_window: 32768
  - id: local-gemma2-2b
    api_type: python_gpu
    model: google/gemma-2-2b-it
    gpus: 1
    context_window: 8192
  - id: local-gemma2-9b
    api_type: python_gpu
    model: google/gemma-2-9b-it
    gpus: 1
    context_window: 8192
  - id: local-longctx-7b
    api_type: python_gpu
    model: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
    gpus: 1
    context_window: 128000

prompts_file: config/benchmark_prompts.json
evaluator_type: llm_judge
two_step: false
batch_size: 10
top_k: 10
wait_for_revive_seconds: 0
num_samples: 30

judge_api_type: ucsf_versa
judge_model_type: "4o"

parquet_paths:
  train: data/benchmark_splits/benchmark.parquet
from_db: false
