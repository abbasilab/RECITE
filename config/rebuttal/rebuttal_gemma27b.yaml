# REBUTTAL: Gemma 2 27B evaluation (python_gpu)
# Completes Gemma scaling story: 2B → 9B → 27B
#
# Usage:
#   uv run python -m recite.cli.benchmark run-benchmark --config config/rebuttal_gemma27b.yaml

rag:
  embed_base_url: ""
  embed_model: ""
  embed_local_model: BAAI/bge-small-en-v1.5
  embed_device_index: cpu
  embed_device_query: cpu
  persist_dir: data/llamaindex_cache
  top_k: 10
  sweep_no_rag: true
  sweep_rag: false

models:
  - id: gemma2-27b
    api_type: python_gpu
    model: google/gemma-2-27b-it
    gpus: 4
    context_window: 8192

prompts_file: config/benchmark_prompts.json
evaluator_type: default
two_step: false
batch_size: 1
top_k: 10
wait_for_revive_seconds: 30

from_db: false
parquet_paths:
  train: data/benchmark_splits/benchmark.parquet
