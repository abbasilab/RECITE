# REBUTTAL: Gemma 2 27B evaluation via vLLM
# Completes Gemma scaling story: 2B → 9B → 27B
#
# Prerequisites: Start a vLLM server on 4 GPUs:
#   CUDA_VISIBLE_DEVICES=0,1,2,3 vllm serve google/gemma-2-27b-it \
#     --tensor-parallel-size 4 --max-model-len 8192 \
#     --dtype bfloat16 --port 8200 --enforce-eager
#
# Usage:
#   uv run python -m recite.cli.benchmark run-benchmark \
#     --config config/rebuttal/rebuttal_gemma27b.yaml

rag:
  embed_base_url: ""
  embed_model: ""
  embed_local_model: BAAI/bge-small-en-v1.5
  embed_device_index: cpu
  embed_device_query: cpu
  persist_dir: data/llamaindex_cache
  top_k: 10
  sweep_no_rag: true
  sweep_rag: false

models:
  - id: gemma2-27b
    api_type: vllm_endpoint
    model: google/gemma-2-27b-it
    endpoint: http://localhost:8200/v1
    context_window: 8192
    max_concurrent: 16
    save_every: 50

prompts_file: config/benchmark_prompts.json
evaluator_type: default
two_step: false
batch_size: 50
top_k: 10
wait_for_revive_seconds: 60
max_concurrent_requests: 10

from_db: false
parquet_paths:
  train: data/benchmark_splits/benchmark.parquet
