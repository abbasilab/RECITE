# Rebuttal: Llama-3.1-70B-Instruct (AWQ-INT4) via vLLM
# Context window matched to vLLM --max-model-len 32768

rag:
  embed_base_url: ""
  embed_model: ""
  embed_local_model: BAAI/bge-small-en-v1.5
  embed_device_index: cpu
  embed_device_query: cpu
  persist_dir: data/llamaindex_cache
  top_k: 10
  sweep_no_rag: true
  sweep_rag: false

models:
  - id: vllm-llama-70b
    api_type: vllm_endpoint
    model: meta-llama/Llama-3.1-70B-Instruct
    endpoint: http://localhost:8100/v1
    context_window: 32768
    max_concurrent: 16
    save_every: 50

prompts_file: config/benchmark_prompts.json
evaluator_type: default
two_step: false
batch_size: 50
top_k: 10
wait_for_revive_seconds: 60
max_concurrent_requests: 10

from_db: false
parquet_paths:
  train: data/benchmark_splits/benchmark.parquet
