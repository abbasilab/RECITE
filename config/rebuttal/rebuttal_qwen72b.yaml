# REBUTTAL: Qwen2.5-72B evaluation via vLLM
# Completes Qwen scaling story: 0.5B → 3B → 7B → 72B
#
# Prerequisites: Start a vLLM server on 8 GPUs:
#   vllm serve Qwen/Qwen2.5-72B-Instruct \
#     --tensor-parallel-size 8 --max-model-len 8192 \
#     --dtype bfloat16 --port 8300 --enforce-eager
#
# Usage:
#   uv run python -m recite.cli.benchmark run-benchmark \
#     --config config/rebuttal/rebuttal_qwen72b.yaml

rag:
  embed_base_url: ""
  embed_model: ""
  embed_local_model: BAAI/bge-small-en-v1.5
  embed_device_index: cpu
  embed_device_query: cpu
  persist_dir: data/llamaindex_cache
  top_k: 10
  sweep_no_rag: true
  sweep_rag: false

models:
  - id: qwen25-72b
    api_type: endpoint
    model: Qwen/Qwen2.5-72B-Instruct
    endpoint: http://localhost:8300/v1
    context_window: 8192

prompts_file: config/benchmark_prompts.json
evaluator_type: default
two_step: false
batch_size: 50
top_k: 10
wait_for_revive_seconds: 60
max_concurrent_requests: 10

from_db: false
parquet_paths:
  train: data/benchmark_splits/benchmark.parquet
