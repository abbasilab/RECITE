# Model Presets for vLLM
# ======================
# Organized by task performance for biomedical paper evaluation and clinical trial matching
#
# Main Tasks:
# 1. Paper Evaluation - Score papers (relevance, extraction_confidence, accrual_ease)
# 2. Match Evaluation - Evaluate paper-trial matches, extract change directives
# 3. Query Generation - Generate search queries for literature and trials
#
# GPU Configuration:
# - Local: 2 GPUs (RTX 4090, ~24GB each, indices 0-1)
#   Models requiring >24GB VRAM per GPU need tensor_parallel >= 2
# - Cluster: 8 GPUs (RTX 5000 Ada, ~32GB each, indices 0-7)
#   Models requiring >32GB VRAM per GPU need tensor_parallel >= 2

cache:
  local: "~/.cache/huggingface"
  cluster: "~/.cache/huggingface"

presets:
  # ============================================================================
  # RELIABLE WORKHORSES - Go-To First Pass Models
  # Proven, dependable, versatile - use these for reliable daily work
  # ============================================================================
  
  # Your current default - proven workhorse, good balance for all tasks
  # Note: 32B AWQ model requires ~21.2GB VRAM, which exceeds 85% safety threshold on 24GB GPUs
  # Therefore requires tensor_parallel=2 for safety (accounts for context overhead and KV cache)
  # gpu_mem set to 0.85 to leave headroom for CUDA graph warmup (0.9 causes OOM during initialization)
  # enforce_eager enabled to prevent CUDA graph compilation hangs/timeouts
  local:
    model: "Qwen/Qwen2.5-32B-Instruct-AWQ"
    tensor_parallel: 2
    cache_dir: "local"
    max_model_len: 6400  # GPU limit ~6448, using 6400 for safety
    gpu_mem: 0.85  # Reduced from 0.9 to prevent OOM during CUDA graph warmup
    enforce_eager: true  # Prevents CUDA graph compilation hangs/timeouts
    description: "WORKHORSE: 2x GPUs (~21GB VRAM) - Proven reliable, good for all tasks"

  cluster-72b:
    model: "Qwen/Qwen2.5-72B-Instruct-AWQ"
    tensor_parallel: 2
    cache_dir: "cluster"
    max_model_len: 16384
    gpu_mem: 0.75  # Reduced to 0.75 for CUDA graph capture headroom
    enforce_eager: true  # Prevents OOM during CUDA graph capture on 32GB GPUs
    description: "WORKHORSE: 2x GPUs (~40GB VRAM) - Proven reliable, higher quality"

  # DeepSeek R1 - Proven reasoning workhorse, on-par with GPT-4o
  # 90.8% MMLU, 79.8% AIME, 97.3% MATH-500 - time-tested excellence
  deepseek-r1-7b:
    model: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 128000
    gpu_mem: 0.9
    description: "WORKHORSE: Single GPU (~16GB VRAM) - Proven reasoning, on-par with GPT-4o"

  deepseek-r1-32b:
    model: "deepseek-ai/DeepSeek-R1-Distill-Qwen-32B"
    tensor_parallel: 2
    cache_dir: "cluster"
    max_model_len: 32768  # Reduced from 128K to prevent OOM on 32GB GPUs with large KV cache
    gpu_mem: 0.75  # Reduced to 0.75 to leave ~8GB headroom for CUDA graph capture
    enforce_eager: true  # Enabled by default - CUDA graph capture OOMs on 32GB GPUs with this model
    description: "WORKHORSE: 2x GPUs (~40GB VRAM) - Proven reasoning excellence. Note: Model has 40 attention heads, so valid TP sizes are 1,2,4,5,8,10,20,40"

  # Qwen3 - Proven workhorse with thinking mode
  # Seamless switching between reasoning and general modes
  qwen3-32b:
    model: "Qwen/Qwen3-32B"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 32768  # Native, expandable to 131K
    gpu_mem: 0.9
    description: "WORKHORSE: Single GPU (~20GB VRAM) - Proven, thinking mode, versatile"

  cluster-qwen3-32b:
    model: "Qwen/Qwen3-32B"
    tensor_parallel: 1
    cache_dir: "cluster"
    max_model_len: 32768  # Reduced from 131K to prevent OOM on 32GB GPUs
    gpu_mem: 0.85  # Reduced to leave headroom for KV cache
    description: "WORKHORSE: Cluster - Proven, thinking mode, 32K context (reduced from 131K for stability)"

  # GLM-4.5 - Proven workhorse, ranked 3rd overall
  # Hybrid reasoning with thinking mode, still competitive in 2026
  glm4.5-air:
    model: "zai-org/GLM-4.5-Air"  # 12B active params, more efficient
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 128000
    gpu_mem: 0.9
    description: "WORKHORSE: Single GPU (~20GB VRAM) - Proven, ranked 3rd, hybrid reasoning"

  cluster-glm4.5:
    model: "zai-org/GLM-4.5"  # 32B active params, full model
    tensor_parallel: 2
    cache_dir: "cluster"
    max_model_len: 32768  # Reduced from 128K to prevent OOM on 32GB GPUs
    gpu_mem: 0.75  # Reduced to 0.75 for CUDA graph capture headroom
    enforce_eager: true  # Prevents OOM during CUDA graph capture on 32GB GPUs
    description: "WORKHORSE: 2x GPUs (~80GB VRAM) - Proven, ranked 3rd, thinking mode"

  # Mistral 7B - Reliable workhorse, Apache 2.0 license
  # Highly competitive, proven performance
  mistral-7b:
    model: "mistralai/Mistral-7B-Instruct-v0.3"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 32768
    gpu_mem: 0.9
    description: "WORKHORSE: Single GPU (~16GB VRAM) - Proven reliable, Apache 2.0"

  # ============================================================================
  # LATEST 2026 MODELS - Cutting-Edge (Try After Workhorses)
  # New releases with promising performance, less battle-tested
  # Only includes models that are currently available
  # ============================================================================
  
  # Kimi K2 Thinking - Available Nov 2025, cutting-edge in 2026
  # 1T params (32B active), 51.0 on HLE, 100% on AIME25, 71.3% on SWE-Bench
  cluster-kimi-k2-thinking:
    model: "moonshotai/Kimi-K2-Thinking"
    tensor_parallel: 2
    cache_dir: "cluster"
    max_model_len: 32768  # Reduced from 256K to prevent OOM - 256K context requires too much KV cache memory
    gpu_mem: 0.75  # Reduced to 0.75 for CUDA graph capture headroom
    enforce_eager: true  # Prevents OOM during CUDA graph capture on 32GB GPUs
    description: "LATEST 2026: 2x GPUs (~80GB VRAM) - K2 Thinking, 1T params, SOTA reasoning (32K context for stability)"

  # GLM-4.7-Flash - Available January 2026, fast inference
  # 30B dense model, 128K context, optimized for speed
  glm4.7-flash:
    model: "zai-org/GLM-4.7-Flash"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 128000
    gpu_mem: 0.9
    description: "LATEST 2026: Single GPU (~20GB VRAM) - GLM-4.7-Flash, fast inference, 30B dense"

  cluster-glm4.7-flash:
    model: "zai-org/GLM-4.7-Flash"
    tensor_parallel: 1
    cache_dir: "cluster"
    max_model_len: 32768  # Reduced from 128K to prevent OOM on 32GB GPUs
    gpu_mem: 0.85  # Reduced to leave headroom for KV cache
    description: "LATEST 2026: Cluster - GLM-4.7-Flash, optimized for speed with strong coding"

  cluster-glm4.7:
    model: "zai-org/GLM-4.7"  # Improved coding & math
    tensor_parallel: 2
    cache_dir: "cluster"
    max_model_len: 32768  # Reduced from 128K to prevent OOM on 32GB GPUs
    gpu_mem: 0.75  # Reduced to 0.75 for CUDA graph capture headroom
    enforce_eager: true  # Prevents OOM during CUDA graph capture on 32GB GPUs
    description: "LATEST 2026: 2x GPUs (~80GB VRAM) - GLM-4.7, 42.8% on HLE math benchmark"

  # Gemma 3 - Available March 2025, still very recent
  # 12B/27B sizes, 128K context, multimodal, outperforms Llama 3 & DeepSeek-V3
  gemma3-12b:
    model: "google/gemma-3-12b-it"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 128000
    gpu_mem: 0.9
    description: "LATEST 2026: Single GPU (~20GB VRAM) - Gemma 3 12B, Google's latest, 128K context"

  cluster-gemma3-27b:
    model: "google/gemma-3-27b-it"
    tensor_parallel: 2
    cache_dir: "cluster"
    max_model_len: 32768  # Reduced from 128K to prevent OOM on 32GB GPUs
    gpu_mem: 0.75  # Reduced to 0.75 for CUDA graph capture headroom
    enforce_eager: true  # Prevents OOM during CUDA graph capture on 32GB GPUs
    description: "LATEST 2026: 2x GPUs (~80GB VRAM) - Gemma 3 27B, outperforms Llama 3 & DeepSeek-V3"

  # ============================================================================
  # PAPER EVALUATION - Biomedical understanding for scoring papers
  # Best for: evaluate_paper() - relevance, extraction_confidence, accrual_ease
  # ============================================================================
  
  # Top choice: BioMistral - 10pt improvement on medical benchmarks
  biomistral:
    model: "BioMistral/BioMistral-7B"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 4096
    gpu_mem: 0.9
    description: "Single GPU (~16GB VRAM) - BEST for paper evaluation, biomedical fine-tuned"

  biomistral-awq:
    model: "BioMistral/BioMistral-7B-AWQ-QGS128-W4-GEMM"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 4096
    gpu_mem: 0.9
    description: "Single GPU (~8GB VRAM) - Quantized BioMistral, good for paper evaluation"

  # Clinical LLM alternatives
  med42:
    model: "m42-health/Llama3-Med42-8B"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 4096
    gpu_mem: 0.9
    description: "Single GPU (~16GB VRAM) - Clinical LLM, good for paper evaluation"

  cluster-med42:
    model: "m42-health/Llama3-Med42-70B"
    tensor_parallel: 2
    cache_dir: "cluster"
    max_model_len: 16384
    gpu_mem: 0.75  # Reduced to 0.75 for CUDA graph capture headroom
    enforce_eager: true  # Prevents OOM during CUDA graph capture on 32GB GPUs
    description: "2x GPUs (~80GB VRAM) - High-performance clinical model for paper evaluation"

  cluster-meditron-70b:
    model: "OpenMeditron/Meditron3-70B"
    tensor_parallel: 2
    cache_dir: "cluster"
    max_model_len: 16384
    gpu_mem: 0.75  # Reduced to 0.75 for CUDA graph capture headroom
    enforce_eager: true  # Prevents OOM during CUDA graph capture on 32GB GPUs
    description: "2x GPUs (~80GB VRAM) - Meditron3-70B, fine-tuned from Llama-3.1-70B"

  # Lightweight biomedical option
  biomedlm:
    model: "stanford-crfm/BioMedLM-2.7B"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 4096
    gpu_mem: 0.8
    description: "Single GPU (~8GB VRAM) - Lightweight biomedical model"

  aloe-7b:
    model: "AdaptLLM/medicine-LLM"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 4096
    gpu_mem: 0.9
    description: "Single GPU (~16GB VRAM) - Medical LLM fine-tuned from LLaMA-7B"

  # ============================================================================
  # MATCH EVALUATION - Reasoning & structured extraction
  # Best for: evaluate_match() - extract change directives, match reasoning
  # Note: See TOP RECOMMENDATIONS above for DeepSeek R1, GLM-4.5/4.7, Qwen3
  # ============================================================================
  
  # GLM-4 - strong performance, long context (older but still good)
  glm4-9b:
    model: "zai-org/glm-4-9b-chat"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 128000
    gpu_mem: 0.9
    description: "Single GPU (~20GB VRAM) - GLM-4-9B, outperforms Llama-3-8B, 128K context"

  cluster-glm4-9b:
    model: "zai-org/glm-4-9b-chat"
    tensor_parallel: 1
    cache_dir: "cluster"
    max_model_len: 32768  # Reduced from 128K to prevent OOM on 32GB GPUs
    gpu_mem: 0.85  # Reduced to leave headroom for KV cache
    description: "Cluster single GPU - GLM-4-9B with 32K context for match evaluation"

  # ============================================================================
  # QUERY GENERATION - General purpose, versatile
  # Best for: generate_queries(), generate_trial_queries()
  # ============================================================================
  
  # Mistral - highly competitive, Apache 2.0 license
  mistral-7b:
    model: "mistralai/Mistral-7B-Instruct-v0.3"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 32768
    gpu_mem: 0.9
    description: "Single GPU (~16GB VRAM) - Mistral 7B, good for query generation"

  cluster-mistral-8b:
    model: "mistralai/Mixtral-8x7B-Instruct-v0.1"
    tensor_parallel: 2
    cache_dir: "cluster"
    max_model_len: 32768
    gpu_mem: 0.75  # Reduced to 0.75 for CUDA graph capture headroom
    enforce_eager: true  # Prevents OOM during CUDA graph capture on 32GB GPUs
    description: "2x GPUs (~40GB VRAM) - Mixtral 8x7B MoE, high quality for queries"

  cluster-mistral-22b:
    model: "mistralai/Mistral-Large-Instruct-2409"
    tensor_parallel: 2
    cache_dir: "cluster"
    max_model_len: 32768  # Reduced from 128K to prevent OOM on 32GB GPUs
    gpu_mem: 0.75  # Reduced to 0.75 for CUDA graph capture headroom
    enforce_eager: true  # Prevents OOM during CUDA graph capture on 32GB GPUs
    description: "2x GPUs (~80GB VRAM) - Mistral Large 22B, very capable for queries"

  # Yi models - efficient and capable
  yi-6b:
    model: "01-ai/Yi-6B-Chat"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 4096
    gpu_mem: 0.9
    description: "Single GPU (~12GB VRAM) - Yi 6B, efficient for query generation"

  cluster-yi-34b:
    model: "01-ai/Yi-34B-Chat"
    tensor_parallel: 2
    cache_dir: "cluster"
    max_model_len: 16384
    gpu_mem: 0.75  # Reduced to 0.75 for CUDA graph capture headroom
    enforce_eager: true  # Prevents OOM during CUDA graph capture on 32GB GPUs
    description: "2x GPUs (~80GB VRAM) - Yi 34B, high quality for queries"

  # ============================================================================
  # LONG CONTEXT MODELS - For processing full papers/trials
  # Best for: Tasks requiring full paper abstracts or long trial descriptions
  # ============================================================================
  
  # Llama 3.2 - lightweight with 128K context
  llama3.2-3b:
    model: "meta-llama/Llama-3.2-3B-Instruct"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 128000
    gpu_mem: 0.8
    description: "Single GPU (~8GB VRAM) - Llama 3.2 3B, lightweight, 128K context"

  cluster-llama3.2-11b:
    model: "meta-llama/Llama-3.2-11B-Instruct"
    tensor_parallel: 1
    cache_dir: "cluster"
    max_model_len: 32768  # Reduced from 128K to prevent OOM on 32GB GPUs
    gpu_mem: 0.85  # Reduced to leave headroom for KV cache
    description: "Cluster single GPU - Llama 3.2 11B, 32K context"

  # ============================================================================
  # ADDITIONAL VARIANTS - Specialized or alternative options
  # ============================================================================
  
  # Qwen variants
  cluster-qwen3:
    model: "Qwen/Qwen3-235B-A22B-FP8"
    tensor_parallel: 4
    cache_dir: "cluster"
    max_model_len: 32768
    gpu_mem: 0.75  # Reduced to 0.75 for CUDA graph capture headroom
    enforce_eager: true  # Prevents OOM during CUDA graph capture on 32GB GPUs
    description: "4x GPUs (~120GB VRAM) - Qwen3 MoE, very capable, 32k context"

  cluster-qwen2.5-14b:
    model: "Qwen/Qwen2.5-14B-Instruct-AWQ"
    tensor_parallel: 1
    cache_dir: "cluster"
    max_model_len: 16384
    gpu_mem: 0.85  # Reduced to leave headroom for KV cache
    description: "Cluster single GPU - Qwen 2.5 14B AWQ, good balance"

  qwen2.5-coder-7b:
    model: "Qwen/Qwen2.5-Coder-7B-Instruct"
    tensor_parallel: 1
    cache_dir: "local"
    max_model_len: 32768
    gpu_mem: 0.9
    description: "Single GPU (~16GB VRAM) - Qwen 2.5 Coder, specialized for code"

  # Llama alternatives
  cluster-llama:
    model: "meta-llama/Llama-3.1-70B-Instruct"
    tensor_parallel: 2
    cache_dir: "cluster"
    max_model_len: 16384
    gpu_mem: 0.75  # Reduced to 0.75 for CUDA graph capture headroom
    enforce_eager: true  # Prevents OOM during CUDA graph capture on 32GB GPUs
    description: "2x GPUs (~40GB VRAM) - Llama 3.1 70B, alternative to Qwen"
