# DEFAULT: Full benchmark config with all models (cluster A + B).
# Use this for single-machine runs or reference. For multi-machine, use:
#   - benchmarks_train_*.yaml (train split, ~3k samples)
#   - benchmarks_eval_*.yaml  (eval split, ~8.8k samples)
# Run: uv run recite.py run --config config/benchmarks.yaml --backend all

rag:
  embed_base_url: ""
  embed_model: ""
  embed_local_model: BAAI/bge-small-en-v1.5
  embed_device_index: cuda:0
  embed_device_query: cpu
  persist_dir: data/llamaindex_cache
  top_k: 10
  sweep_no_rag: true

models:
  # Versa (cluster A)
  - id: versa-4o
    api_type: ucsf_versa
    model: gpt-4o-2024-08-06
    context_window: 128000
  - id: versa-4o-mini
    api_type: ucsf_versa
    model: gpt-4o-mini-2024-07-18
    context_window: 128000
  # Local (cluster A)
  - id: local-qwen-0.5b
    api_type: python_gpu
    model: Qwen/Qwen2.5-0.5B-Instruct
    gpus: 1
    context_window: 32768
  - id: local-qwen-3b
    api_type: python_gpu
    model: Qwen/Qwen2.5-3B-Instruct
    gpus: 1
    context_window: 32768
  - id: local-qwen-7b
    api_type: python_gpu
    model: Qwen/Qwen2.5-7B-Instruct
    gpus: 1
    context_window: 32768
  - id: local-gemma2-2b
    api_type: python_gpu
    model: google/gemma-2-2b-it
    gpus: 1
    context_window: 8192
  # Local (cluster B)
  - id: local-gemma2-9b
    api_type: python_gpu
    model: google/gemma-2-9b-it
    gpus: 1
    context_window: 8192
  - id: local-longctx-7b
    api_type: python_gpu
    model: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
    gpus: 1
    context_window: 128000

prompts_file: config/benchmark_prompts.json
evaluator_type: llm_judge
two_step: false
batch_size: 10
top_k: 10
wait_for_revive_seconds: 0

judge_api_type: ucsf_versa
judge_model_type: "4o"

parquet_paths:
  benchmark: data/benchmark_splits/benchmark.parquet
splits_to_run: [benchmark]
from_db: false

