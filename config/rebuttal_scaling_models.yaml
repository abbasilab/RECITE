# REBUTTAL: Large model scaling evaluation
# Runs Gemma 2 27B + Qwen2.5-72B on Abbasi GPU clusters
# Predictions only — NO paid judge calls
#
# Usage (single model):
#   uv run python -m recite.cli.benchmark --config config/rebuttal_scaling_models.yaml --model-id gemma2-27b
#   uv run python -m recite.cli.benchmark --config config/rebuttal_scaling_models.yaml --model-id qwen25-72b
#
# Usage (all rebuttal models):
#   uv run python -m recite.cli.benchmark --config config/rebuttal_scaling_models.yaml
#
# For endpoint models (vLLM served), start the server first:
#   vllm serve google/gemma-2-27b-it --tensor-parallel-size 4 --port 8000 --max-model-len 32768
#   vllm serve Qwen/Qwen2.5-72B-Instruct-AWQ --tensor-parallel-size 4 --port 8000 --max-model-len 32768

rag:
  embed_base_url: ""
  embed_model: ""
  embed_local_model: BAAI/bge-small-en-v1.5
  embed_device_index: cpu
  embed_device_query: cpu
  persist_dir: data/llamaindex_cache
  top_k: 10
  sweep_no_rag: true

models:
  # Gemma 2 27B — completes 2B → 9B → 27B scaling story
  - id: gemma2-27b
    api_type: python_gpu
    model: google/gemma-2-27b-it
    gpus: 4
    context_window: 8192

  # Qwen2.5-72B — completes 0.5B → 3B → 7B → 72B scaling story
  - id: qwen25-72b
    api_type: python_gpu
    model: Qwen/Qwen2.5-72B-Instruct-AWQ
    gpus: 4
    context_window: 32768

  # Llama-3.1-70B — already evaluated (endpoint mode)
  # Uncomment to re-run via endpoint:
  # - id: llama31-70b
  #   api_type: endpoint
  #   model: meta-llama/Llama-3.1-70B-Instruct
  #   endpoint: http://localhost:8000/v1
  #   context_window: 131072

prompts_file: config/benchmark_prompts.json

# DEFAULT evaluator — automatic metrics only, NO paid judge
evaluator_type: default
two_step: false
batch_size: 1
top_k: 10
wait_for_revive_seconds: 30

from_db: false
parquet_paths:
  train: data/benchmark_splits/benchmark.parquet
